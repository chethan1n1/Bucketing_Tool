<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bucketing Assistant</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="ambient" aria-hidden="true">
<div class="orb orb-a"></div>
<div class="orb orb-b"></div>
<div class="noise"></div>
</div>

<button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
<svg class="icon sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
<circle cx="12" cy="12" r="4"></circle>
<line x1="12" y1="2" x2="12" y2="4"></line>
<line x1="12" y1="20" x2="12" y2="22"></line>
<line x1="4.93" y1="4.93" x2="6.34" y2="6.34"></line>
<line x1="17.66" y1="17.66" x2="19.07" y2="19.07"></line>
<line x1="2" y1="12" x2="4" y2="12"></line>
<line x1="20" y1="12" x2="22" y2="12"></line>
<line x1="4.93" y1="19.07" x2="6.34" y2="17.66"></line>
<line x1="17.66" y1="6.34" x2="19.07" y2="4.93"></line>
</svg>
<svg class="icon moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
<path d="M21 12.8A9 9 0 1 1 11.2 3a7.2 7.2 0 0 0 9.8 9.8Z"></path>
</svg>
</button>

<main class="app-shell">
<section class="hero reveal reveal-1">
<p class="eyebrow">Precision Classification</p>
<h1>Bucketing Assistant</h1>
<p class="subtitle">Fast taxonomy decisions with deterministic lookup and intelligent AI fallback.</p>
</section>

<section class="workspace reveal reveal-2">
<section class="card form-card" id="main-card">
<form id="predict-form" class="form" novalidate>
<div class="field reveal reveal-3" data-field="category">
<div class="field-control">
<input id="category" name="category" type="text" autocomplete="off" placeholder=" " required />
<label for="category">Category</label>
<span class="gradient-ring" aria-hidden="true"></span>
</div>
<p id="category-error" class="error-text" role="alert" aria-live="polite"></p>
</div>

<div class="field reveal reveal-4" data-field="factors">
<div class="field-control">
<textarea id="factors" name="factors" rows="1" placeholder=" " required></textarea>
<label for="factors">Factors (one per line or comma-separated)</label>
<span class="gradient-ring" aria-hidden="true"></span>
</div>
<p id="factors-error" class="error-text" role="alert" aria-live="polite"></p>
</div>

<div class="actions reveal reveal-5">
<button id="submit-btn" class="submit-button" type="submit" disabled>
<span class="btn-content">
<span class="button-text">Classify</span>
<svg class="button-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M5 12h14"></path>
<path d="m12 5 7 7-7 7"></path>
</svg>
</span>
<span class="spinner" aria-hidden="true"></span>
</button>
<p class="shortcut-hint">Enter in Category moves next. Enter in Factors submits.</p>
</div>
</form>
</section>

<section class="output-column">
<section class="card result-card" id="result-card" hidden>
<div class="result-head">
<div>
<p class="result-label">Classification Result</p>
<h2 id="result-category" class="result-category"></h2>
</div>
<button id="result-close" class="result-close" type="button" aria-label="Close result">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
<line x1="18" y1="6" x2="6" y2="18"></line>
<line x1="6" y1="6" x2="18" y2="18"></line>
</svg>
</button>
</div>

<div class="results-wrapper">
<table class="results-table">
<thead>
<tr>
<th>Factor</th>
<th>Source</th>
<th>Bucket</th>
</tr>
</thead>
<tbody id="results-tbody"></tbody>
</table>
</div>

<div class="result-actions">
<div class="download-actions" aria-label="Download result formats">
<button id="download-excel" class="secondary-button secondary-button-soft" type="button">Excel</button>
<button id="download-pdf" class="secondary-button secondary-button-soft" type="button">PDF</button>
<button id="download-image" class="secondary-button secondary-button-soft" type="button">Image</button>
<button id="download-json" class="secondary-button secondary-button-soft" type="button">JSON</button>
</div>
<button id="reset-btn" class="secondary-button" type="button">New Classification</button>
</div>
</section>

<section id="empty-state" class="empty-state output-note reveal reveal-6" hidden aria-live="polite">
</section>
</section>
</section>
</main>

<footer class="site-footer" aria-label="Site credit">
<a href="https://chethanyallampalli.site" target="_blank" rel="noopener noreferrer">Built by Chethan Y ↗</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="app.js"></script>
</body>
</html>
